<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient for the bot head -->
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#764ba2" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#headGradient)" filter="url(#shadow)"/>

  <!-- Inner circle highlight -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Robot head outline -->
  <rect x="126" y="140" width="260" height="220" rx="40" ry="40" fill="white" opacity="0.95"/>

  <!-- Antenna base -->
  <rect x="236" y="100" width="40" height="50" rx="8" fill="white"/>

  <!-- Antenna ball -->
  <circle cx="256" cy="85" r="22" fill="url(#accentGradient)" filter="url(#glow)"/>
  <circle cx="250" cy="79" r="6" fill="white" opacity="0.8"/>

  <!-- Left eye -->
  <circle cx="186" cy="230" r="38" fill="url(#headGradient)"/>
  <circle cx="186" cy="230" r="28" fill="#1a1a2e"/>
  <circle cx="195" cy="220" r="12" fill="url(#accentGradient)"/>
  <circle cx="200" cy="215" r="5" fill="white"/>

  <!-- Right eye -->
  <circle cx="326" cy="230" r="38" fill="url(#headGradient)"/>
  <circle cx="326" cy="230" r="28" fill="#1a1a2e"/>
  <circle cx="335" cy="220" r="12" fill="url(#accentGradient)"/>
  <circle cx="340" cy="215" r="5" fill="white"/>

  <!-- Mouth / Speaker grille -->
  <rect x="186" y="295" width="140" height="40" rx="20" fill="url(#headGradient)"/>
  <line x1="206" y1="300" x2="206" y2="330" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="231" y1="300" x2="231" y2="330" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="300" x2="256" y2="330" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="281" y1="300" x2="281" y2="330" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="306" y1="300" x2="306" y2="330" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Side panels (ears) -->
  <rect x="96" y="200" width="25" height="80" rx="10" fill="url(#accentGradient)"/>
  <rect x="391" y="200" width="25" height="80" rx="10" fill="url(#accentGradient)"/>

  <!-- Decorative dots -->
  <circle cx="150" cy="175" r="8" fill="url(#accentGradient)" opacity="0.8"/>
  <circle cx="362" cy="175" r="8" fill="url(#accentGradient)" opacity="0.8"/>

  <!-- Chat bubble indicator -->
  <g transform="translate(360, 100)">
    <path d="M0,0 L60,0 Q75,0 75,15 L75,45 Q75,60 60,60 L25,60 L15,75 L15,60 L15,60 Q0,60 0,45 L0,15 Q0,0 15,0 Z" fill="url(#accentGradient)" filter="url(#glow)"/>
    <circle cx="22" cy="32" r="5" fill="white"/>
    <circle cx="38" cy="32" r="5" fill="white"/>
    <circle cx="54" cy="32" r="5" fill="white"/>
  </g>

  <!-- Neural network pattern (subtle) -->
  <g opacity="0.15">
    <circle cx="140" cy="420" r="4" fill="white"/>
    <circle cx="200" cy="400" r="4" fill="white"/>
    <circle cx="256" cy="420" r="4" fill="white"/>
    <circle cx="312" cy="400" r="4" fill="white"/>
    <circle cx="372" cy="420" r="4" fill="white"/>
    <line x1="140" y1="420" x2="200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="200" y1="400" x2="256" y2="420" stroke="white" stroke-width="1"/>
    <line x1="256" y1="420" x2="312" y2="400" stroke="white" stroke-width="1"/>
    <line x1="312" y1="400" x2="372" y2="420" stroke="white" stroke-width="1"/>
  </g>
</svg>
